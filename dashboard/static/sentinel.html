<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Wazuh Sentinel : Asgard [v1.0]</title>
    <style>
        :root {
            --primary-red: #ff1744;
            --terminal-green: #00e676;
            --text-gold: #ffca28;
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #050505;
            color: #eee;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
        }
        h1 {
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary-red);
            text-shadow: 0 0 10px var(--primary-red);
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 10px;
        }
        .sentinel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .glass-box:hover {
            transform: translateY(-5px);
            border-color: var(--primary-red);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-active { background: var(--terminal-green); box-shadow: 0 0 10px var(--terminal-green); }
        .status-disconnected { background: var(--primary-red); box-shadow: 0 0 10px var(--primary-red); }
        
        .agent-id { font-family: monospace; font-size: 0.8em; color: var(--text-gold); }
        .agent-name { font-size: 1.2em; font-weight: bold; margin: 10px 0; }
        .agent-os { font-size: 0.85em; opacity: 0.7; }
        
        .alert-section {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid var(--glass-border);
        }
        .alert-tag {
            font-size: 0.75em;
            background: rgba(255, 23, 68, 0.2);
            color: #ff8a80;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 5px;
            display: block;
            border-left: 3px solid var(--primary-red);
        }
        .no-alerts { color: var(--terminal-green); font-size: 0.8em; opacity: 0.6; }
    </style>
</head>
<body>
    <h1>🛡️ Wazuh Sentinel : Fleet Status</h1>
    <div id="loading" style="text-align:center; margin-top:50px; font-family:monospace; color:var(--text-gold);">[ SCANNING_VAULT... ]</div>
    <div class="sentinel-grid" id="sentinelGrid"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zhvxjuhgfudavxrfsasn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6RNTxeaqITfQxj1mCF263Q_5E_n-4Yb';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadSentinel() {
            try {
                // Fetch latest Wazuh metadata from telemetry table (stored by sync script)
                const { data, error } = await _supabase
                    .from('agent_logs')
                    .select('*')
                    .eq('agent_name', 'Heimdal (Hunter)')
                    .order('created_at', { ascending: false })
                    .limit(1);

                if (data && data[0] && data[0].metadata) {
                    document.getElementById('loading').style.display = 'none';
                    const stats = data[0].metadata;
                    // Note: In a real scenario, we'd fetch the full agent list from a 'wazuh_agents' table
                    // For this glass UI, we'll map the agents we know are active.
                    // Improving this to be fully dynamic requires the sync script to dump the full list to Supabase.
                    
                    // Fallback to static mock if full list isn't in metadata yet
                    const agents = stats.raw_agents || [
                        { name: 'mydesktop', status: 'active', os: 'Windows 11 Pro', id: '001', ip: '192.168.1.156' },
                        { name: 'Bruce-Backup', status: 'disconnected', os: 'Ubuntu 22.04', id: '003', ip: '208.87.135.84' },
                        { name: 'ITFlow', status: 'active', os: 'Ubuntu 24.04', id: '004', ip: '208.87.135.193' },
                        { name: 'RMM', status: 'active', os: 'Ubuntu 22.04', id: '009', ip: '208.87.135.69' }
                    ];

                    const grid = document.getElementById('sentinelGrid');
                    grid.innerHTML = agents.map(a => `
                        <div class="glass-box">
                            <div class="agent-id">ID: ${a.id} // ${a.ip}</div>
                            <div class="agent-name">
                                <span class="status-dot ${a.status === 'active' ? 'status-active' : 'status-disconnected'}"></span>
                                ${a.name.toUpperCase()}
                            </div>
                            <div class="agent-os">${a.os}</div>
                            <div class="alert-section">
                                <div style="font-size: 0.7em; margin-bottom: 5px; color: var(--text-gold);">LATEST_SECURITY_EVENTS</div>
                                ${a.status === 'disconnected' ? '<span class="alert-tag">DISCONNECTION_DETECTED: NODE_OFFLINE</span>' : '<div class="no-alerts">[ NO_CRITICAL_ALERTS ]</div>'}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error("Sentinel Error:", err);
            }
        }

        loadSentinel();
        setInterval(loadSentinel, 30000);
    </script>
</body>
</html>
