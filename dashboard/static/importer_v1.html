<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Asgard CSV Importer (v1.0)</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; border-bottom: 2px solid #d32f2f; padding-bottom: 10px; }
        .upload-zone { border: 3px dashed #ccc; padding: 40px; text-align: center; cursor: pointer; border-radius: 8px; margin-bottom: 20px; transition: 0.3s; }
        .upload-zone:hover { border-color: #d32f2f; background: #fff8f8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f8f8f8; }
        .status { margin-top: 20px; font-family: monospace; font-size: 0.9em; padding: 10px; background: #333; color: #0f0; border-radius: 4px; max-height: 200px; overflow-y: auto; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #d32f2f; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 Site Audit Device Importer</h2>
        <p>Use this tool to bulk-populate the <strong>site_audit_devices</strong> table from a CSV.</p>
        
        <label>Target Site Name</label>
        <input type="text" id="targetSite" value="Benowa ELC" style="margin-bottom: 20px; font-size: 1.1em; padding: 10px; width: 100%; border: 1px solid #ccc; border-radius: 4px;">

        <div class="upload-zone" onclick="document.getElementById('csvInput').click()">
            <p id="uploadPrompt">📁 Drop CSV here or click to browse</p>
            <input type="file" id="csvInput" accept=".csv" style="display:none">
        </div>

        <div id="previewArea" style="display:none;">
            <h3>Data Preview (First 5 Rows)</h3>
            <div id="tableTarget"></div>
            <button id="importBtn" onclick="runImport()">Confirm & Import to Supabase</button>
        </div>

        <div id="log" class="status" style="display:none;">Ready...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zhvxjuhgfudavxrfsasn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6RNTxeaqITfQxj1mCF263Q_5E_n-4Yb';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let csvData = [];
        const log = document.getElementById('log');

        document.getElementById('csvInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    csvData = results.data;
                    renderPreview();
                }
            });
        });

        function renderPreview() {
            document.getElementById('previewArea').style.display = 'block';
            document.getElementById('uploadPrompt').innerText = "Selected: " + csvData.length + " rows detected.";
            
            const keys = Object.keys(csvData[0]);
            let html = '<table><tr>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr>';
            csvData.slice(0, 5).forEach(row => {
                html += '<tr>' + keys.map(k => `<td>${row[k]}</td>`).join('') + '</tr>';
            });
            document.getElementById('tableTarget').innerHTML = html + '</table>';
        }

        async function runImport() {
            const site = document.getElementById('targetSite').value;
            const btn = document.getElementById('importBtn');
            btn.disabled = true;
            log.style.display = 'block';
            log.innerText = "Starting import for site: " + site + "\n";

            for (let i = 0; i < csvData.length; i++) {
                const row = csvData[i];
                // Map your CSV columns here:
                const name = row.name || row.Name || row.Device || "";
                const serial = row.serial || row.Serial || row.SN || "";
                const type = row.type || row.Type || "Laptop";

                if (!serial) {
                    log.innerText += `Row ${i+1}: Skipped (No Serial)\n`;
                    continue;
                }

                const { error } = await _supabase.from('site_audit_devices').upsert({
                    site_name: site,
                    name: name,
                    serial: serial,
                    type: type
                }, { onConflict: 'site_name, serial' });

                if (error) {
                    log.innerText += `Row ${i+1} [${serial}]: ERROR - ${error.message}\n`;
                } else {
                    log.innerText += `Row ${i+1} [${serial}]: Success\n`;
                }
                log.scrollTop = log.scrollHeight;
            }

            log.innerText += "\n--- IMPORT COMPLETE ---";
            btn.innerText = "Import Finished";
            alert("Importer has finished processing. Check the log for details.");
        }
    </script>
</body>
</html>
