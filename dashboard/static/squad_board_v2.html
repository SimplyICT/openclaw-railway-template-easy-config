<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Asgard Team : Squad Board [v1.2]</title>
    <style>
        :root {
            --primary-red: #ff1744;
            --terminal-green: #00e676;
            --text-gold: #ffca28;
            --panel-bg: rgba(20, 20, 25, 0.9);
            --glass-border: rgba(255, 255, 255, 0.1);
            --column-width: 300px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #050505;
            color: #eee;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            overflow-x: auto;
        }
        h1 {
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary-red);
            text-shadow: 0 0 10px var(--primary-red);
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 15px;
            margin-top:0;
        }
        .kanban-container {
            display: flex;
            gap: 20px;
            padding-top: 20px;
            min-height: 80vh;
        }
        .kanban-column {
            flex: 0 0 var(--column-width);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }
        .column-header {
            padding: 15px;
            background: rgba(255, 23, 68, 0.1);
            border-bottom: 1px solid var(--primary-red);
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-gold);
        }
        .task-list {
            padding: 10px;
            flex-grow: 1;
            overflow-y: auto;
        }
        .agent-card {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            position: relative;
            cursor: pointer;
        }
        .agent-card:hover { border-color: var(--text-gold); transform: translateY(-3px); }
        .agent-icon { font-size: 1.5em; margin-bottom: 10px; }
        .agent-title { font-weight: bold; color: var(--terminal-green); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .task-msg { font-size: 0.75em; opacity: 0.8; font-family: monospace; line-height: 1.4; display: block; }
        .timestamp { font-size: 0.6em; color: var(--text-gold); margin-top: 10px; display: block; opacity: 0.6; }
        
        .status-badge {
            font-size: 0.6em;
            padding: 2px 6px;
            border-radius: 4px;
            position: absolute;
            top: 15px;
            right: 15px;
            background: #333;
        }
        .status-active { background: var(--terminal-green); color: #000; }
        .status-responding { background: var(--primary-red); color: #fff; animation: blink 2s infinite; }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #111;
            margin: 5% auto;
            padding: 30px;
            border: 1px solid var(--primary-red);
            width: 60%;
            border-radius: 12px;
            box-shadow: 0 0 30px var(--primary-red);
            color: #fff;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: var(--text-gold);
            cursor: pointer;
        }
        .modal-header {
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .modal-body { line-height: 1.6; }
        .detail-row { margin-bottom: 15px; border-left: 3px solid var(--text-gold); padding-left: 15px; }
        .detail-label { display: block; font-size: 0.7em; text-transform: uppercase; color: var(--text-gold); }
        .detail-value { display: block; font-size: 1.1em; font-family: 'Courier New', Courier, monospace; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h1>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>🛡️ Asgard Squad Board : Tactical Kanban [v1.2]</span>
            <a href="index_v3.html" style="background:var(--primary-red); color:white; text-decoration:none; padding:8px 15px; font-weight:bold; border-radius:4px; font-size:0.4em; border: 1px solid var(--text-gold); text-shadow:none; letter-spacing:normal;">🔙 MISSION CONTROL</a>
        </div>
    </h1>
    <div id="loading" style="text-align:center; padding:100px; font-family:monospace; color:var(--text-gold);">[ GATHERING_SQUAD_INTEL... ]</div>
    
    <div id="agentModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <div class="kanban-container" id="kanbanBoard" style="display:none;">
        <div class="kanban-column" id="col-standby">
            <div class="column-header">Standby / Idle</div>
            <div class="task-list" id="list-standby"></div>
        </div>
        <div class="kanban-column" id="col-monitoring">
            <div class="column-header">Active / Monitoring</div>
            <div class="task-list" id="list-monitoring"></div>
        </div>
        <div class="kanban-column" id="col-incident">
            <div class="column-header">Incident Response</div>
            <div class="task-list" id="list-incident"></div>
        </div>
        <div class="kanban-column" id="col-forensics">
            <div class="column-header">Post-Incident / Review</div>
            <div class="task-list" id="list-forensics"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://zhvxjuhgfudavxrfsasn.supabase.co', 'sb_publishable_6RNTxeaqITfQxj1mCF263Q_5E_n-4Yb');
        
        const agentIcons = {
            'Bruce': '🦞', 'Thor': '⚡', 'Loki': '🕵️‍♂️', 'Heimdall': '👁️', 'Lady Sif': '🗡️', 'Coulson': '💼', 'Erik': '🏗️', 'Odin': '👑'
        };

        let currentSquadData = {};

        function getColumn(agent, status, description) {
            const descLower = description.toLowerCase();
            const statusUpper = status.toUpperCase();
            if (statusUpper.includes('RESPOND') || descLower.includes('incident') || descLower.includes('alert')) return 'list-incident';
            if (descLower.includes('review') || descLower.includes('forensic') || descLower.includes('cleanup')) return 'list-forensics';
            if (statusUpper.includes('ACTIVE') || statusUpper.includes('HEALTHY') || descLower.includes('sync')) return 'list-monitoring';
            return 'list-standby';
        }

        function openAgentModal(memberName) {
            const log = currentSquadData[memberName];
            if (!log) return;
            const icon = agentIcons[memberName] || '🛡️';
            const parts = log.task_description.split('||');
            const summary = parts[0];
            const expanded = parts[1] || 'No additional telemetry data available for this cycle.';
            const remediation = parts[2] || 'Awaiting automated or manual investigative command.';

            const modalHtml = `
                <div class="modal-header">
                    <span style="font-size: 3em;">${icon}</span>
                    <div>
                        <h2 style="margin:0; color:var(--primary-red);">${log.agent_name.toUpperCase()}</h2>
                        <span style="color:var(--terminal-green);">${log.status}</span>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="detail-row">
                        <span class="detail-label">Current Mission / Alert</span>
                        <span class="detail-value">${summary}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Tactical Intelligence (Who, What, Where)</span>
                        <span class="detail-value" style="font-size:0.9em; color:#ccc;">${expanded}</span>
                    </div>
                    <div class="detail-row" style="border-left-color: var(--primary-red);">
                        <span class="detail-label">Remediation Action (Why & How)</span>
                        <span class="detail-value" style="color:var(--terminal-green);">${remediation}</span>
                    </div>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = modalHtml;
            document.getElementById('agentModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('agentModal').style.display = 'none'; }

        async function loadSquadBoard() {
            try {
                const { data: logs, error } = await _supabase.from('agent_logs').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('kanbanBoard').style.display = 'flex';
                ['list-standby', 'list-monitoring', 'list-incident', 'list-forensics'].forEach(id => document.getElementById(id).innerHTML = '');

                const squad = ['Bruce', 'Thor', 'Loki', 'Heimdall', 'Lady Sif', 'Coulson', 'Erik', 'Odin'];
                const agentStates = {};

                logs.forEach(log => {
                    const normalizedAgentName = log.agent_name.toLowerCase();
                    const baseName = squad.find(s => normalizedAgentName.includes(s.toLowerCase()));
                    if (baseName && !agentStates[baseName]) { agentStates[baseName] = log; }
                });

                currentSquadData = agentStates;

                squad.forEach(member => {
                    const log = agentStates[member] || { agent_name: member, status: 'STANDBY', task_description: 'Monitoring Asgardian systems...', created_at: new Date().toISOString() };
                    if(!currentSquadData[member]) currentSquadData[member] = log;
                    const targetCol = getColumn(member, log.status, log.task_description);
                    const icon = agentIcons[member] || '🛡️';
                    const isResponding = targetCol === 'list-incident' || log.status.toUpperCase().includes('RESPONDING');

                    const isLocal = log.model_used && log.model_used.includes('(Local');

                    const div = document.createElement('div');
                    div.className = 'agent-card';
                    if(isResponding) div.style = 'border-color: var(--primary-red); box-shadow: 0 0 15px rgba(255, 23, 68, 0.4);';
                    div.onclick = () => openAgentModal(member);
                    div.innerHTML = `
                        <span class="status-badge ${isResponding ? 'status-responding' : (log.status.toUpperCase() === 'ACTIVE' ? 'status-active' : '')}">${log.status}</span>
                        ${isLocal ? '<span style="position:absolute; top:5px; left:5px; font-size:0.7em; background:var(--terminal-green); color:#000; padding:2px 5px; border-radius:3px; font-weight:bold; letter-spacing:1px;">LOCAL-GPU</span>' : ''}
                        <div class="agent-icon">${icon}</div>
                        <span class="agent-title">${log.agent_name}</span>
                        <span class="task-msg">${log.task_description.split('||')[0]}</span>
                        <span class="timestamp">${new Date(log.created_at).toLocaleString()}</span>
                    `;
                    document.getElementById(targetCol).appendChild(div);
                });
            } catch (err) { console.error(err); }
        }
        loadSquadBoard();
        setInterval(loadSquadBoard, 15000);
    </script>
</body>
</html>
