<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Asgard Mission Control : v3.0.2</title>
    <style>
        :root {
            --primary-red: #ff3d47;
            --accent-gold: #ffca28;
            --terminal-green: #00e676;
            --soft-blue: #2196f3;
            --glass-bg: rgba(15, 15, 20, 0.95);
            --glass-border: rgba(255, 255, 255, 0.15);
            --soft-edge: 15px;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0a0a0c;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 61, 71, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(33, 150, 243, 0.08) 0%, transparent 40%);
        }

        .command-bridge {
            height: 60px;
            background: rgba(10, 10, 12, 0.98);
            border-bottom: 2px solid var(--primary-red);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .brand { font-weight: bold; color: var(--primary-red); letter-spacing: 2px; font-size: 1.2em; display: flex; align-items: center; gap: 10px; }

        .nav-items { display: flex; gap: 10px; }
        .nav-item {
            color: #aaa; text-decoration: none; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px;
            padding: 8px 20px; border-radius: 30px; transition: 0.3s; border: 1px solid transparent; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { color: #fff; border-color: var(--primary-red); background: rgba(255, 61, 71, 0.1); }

        .main-stage {
            flex: 1; display: grid; grid-template-columns: 320px 1fr 320px; padding: 20px; gap: 20px; overflow: hidden;
        }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: var(--soft-edge);
            padding: 20px; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .glass-card h2 { margin: 0 0 20px 0; font-size: 0.85em; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-gold); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }

        .viewport { grid-column: 2; padding: 0; background: transparent; border: none; }
        #viewFrame { width: 100%; height: 100%; border: none; border-radius: var(--soft-edge); background: rgba(0,0,0,0.2); }

        .agent-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .agent-mini-card {
            background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 15px 10px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .agent-mini-card:hover { transform: translateY(-3px); background: rgba(33, 150, 243, 0.1); border-color: var(--soft-blue); }
        .agent-avatar { font-size: 1.8em; margin-bottom: 8px; }
        .agent-name { font-size: 0.75em; font-weight: bold; display: block; margin-bottom: 4px; }
        .agent-status { font-size: 0.6em; color: var(--terminal-green); letter-spacing: 1px; }

        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 10px; border-left: 3px solid var(--primary-red); }
        .stat-label { font-size: 0.75em; color: #888; }
        .stat-val { font-size: 0.85em; font-weight: bold; color: #fff; }

        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .live-pulse { width: 10px; height: 10px; background: var(--terminal-green); border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

    <nav class="command-bridge">
        <div class="brand">
            <span>🦞 ASGARD</span>
            <span style="font-size: 0.4em; color: #444; margin-left: 10px;">SYS_INTEGRATION_v3.0.2</span>
        </div>
        <div class="nav-items">
            <div class="nav-item active" id="btn-hud" onclick="loadView('hud')">HUD</div>
            <div class="nav-item" id="btn-audit" onclick="loadView('audit')">Audit Hub</div>
            <div class="nav-item" id="btn-reports" onclick="loadView('reports')">SharePoint</div>
        </div>
        <div style="font-size: 0.7em; color: var(--terminal-green); letter-spacing: 1px;">
            <span class="live-pulse"></span> ASGARDIAN_WATCHER: ACTIVE
        </div>
    </nav>

    <main class="main-stage">
        <section class="glass-card">
            <h2>📍 Site Intelligence</h2>
            <div class="stat-row"><span class="stat-label">Location</span> <span class="stat-val">Benowa ELC</span></div>
            <div class="stat-row"><span class="stat-label">Security</span> <span class="stat-val">Hardened</span></div>
            <div class="stat-row"><span class="stat-label">Status</span> <span class="stat-val" style="color:var(--terminal-green)">Synced</span></div>
            
            <div style="margin-top: auto;">
                <div style="font-size: 0.65em; color: #666; margin-bottom: 8px; letter-spacing: 1px;">Data Integrity Index</div>
                <div style="height: 8px; width: 100%; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);">
                    <div style="width: 92%; height: 100%; background: linear-gradient(90deg, var(--primary-red), var(--terminal-green));"></div>
                </div>
            </div>
        </section>

        <section class="viewport glass-card">
            <iframe id="viewFrame" name="viewFrame"></iframe>
        </section>

        <section class="glass-card">
            <h2>🛡️ Squad Deployment</h2>
            <div class="agent-gallery">
                <div class="agent-mini-card"><div class="agent-avatar">🦞</div><span class="agent-name">Bruce</span><span class="agent-status">[ACTIVE]</span></div>
                <div class="agent-mini-card"><div class="agent-avatar">⚡</div><span class="agent-name">Thor</span><span class="agent-status">[IDLE]</span></div>
                <div class="agent-mini-card"><div class="agent-avatar">🕵️‍♂️</div><span class="agent-name">Loki</span><span class="agent-status">[IDLE]</span></div>
                <div class="agent-mini-card"><div class="agent-avatar">👁️</div><span class="agent-name">Heimdall</span><span class="agent-status">[SCAN]</span></div>
                <div class="agent-mini-card"><div class="agent-avatar">🗡️</div><span class="agent-name">Sif</span><span class="agent-status">[READY]</span></div>
                <div class="agent-mini-card"><div class="agent-avatar">💼</div><span class="agent-name">Phil</span><span class="agent-status">[WAIT]</span></div>
            </div>
        </section>
    </main>

    <script>
        const views = {
            hud: 'https://raw.githack.com/SimplyICT/OpenClaw-Bruce/main/dashboard/static/index.html',
            audit: 'https://raw.githack.com/SimplyICT/OpenClaw-Bruce/main/dashboard/static/audit_hub_v57.html',
            reports: 'https://cccex1.sharepoint.com/sites/bhelc-admin/Shared%20Documents/Forms/AllItems.aspx?id=%2Fsites%2Fbhelc%2Dadmin%2FShared%20Documents%2FAudit%20reports'
        };

        function loadView(key) {
            // UI Visual Update
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const btn = document.getElementById('btn-' + key);
            if(btn) btn.classList.add('active');
            
            console.log("Loading view:", key);
            const frame = document.getElementById('viewFrame');
            
            // To bypass cache on the iframes as well
            const url = views[key] + (views[key].includes('?') ? '&' : '?') + 'v=' + Date.now();
            frame.src = url;
        }

        window.onload = () => loadView('hud');
    </script>
</body>
</html>
