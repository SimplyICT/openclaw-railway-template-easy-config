<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Asgard Mission Control : v3.0</title>
    <style>
        :root {
            --primary-red: #ff3d47;
            --accent-gold: #ffca28;
            --terminal-green: #00e676;
            --soft-blue: #2196f3;
            --glass-bg: rgba(15, 15, 20, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --soft-edge: 15px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0c;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 61, 71, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 100%, 100% 4px, 3px 100%;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Command Bridge (Nav) */
        .command-bridge {
            height: 60px;
            background: rgba(10, 10, 12, 0.95);
            border-bottom: 1px solid var(--primary-red);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: var(--primary-red);
            letter-spacing: 2px;
            font-size: 1.2em;
        }

        .nav-items {
            display: flex;
            gap: 20px;
        }

        .nav-item {
            color: #aaa;
            text-decoration: none;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            color: #fff;
            border-color: var(--primary-red);
            background: rgba(255, 61, 71, 0.1);
        }

        /* Main View Container */
        .main-stage {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: var(--soft-edge);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .glass-card h2 {
            margin: 0 0 15px 0;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-gold);
            display: flex;
            justify-content: space-between;
        }

        /* Agent Icons (Galleries) */
        .agent-gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .agent-mini-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .agent-mini-card:hover {
            border-color: var(--soft-blue);
            background: rgba(33, 150, 243, 0.1);
        }

        .agent-avatar {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .agent-name {
            font-size: 0.7em;
            font-weight: bold;
            display: block;
        }

        .agent-status {
            font-size: 0.6em;
            color: var(--terminal-green);
        }

        /* Middle Stage (Iframe / Viewport) */
        .viewport {
            grid-column: 2;
            padding: 0;
        }

        #viewFrame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: var(--soft-edge);
            background: #fff;
        }

        /* Stats Blocks */
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .stat-val { font-weight: bold; color: var(--primary-red); }

        /* Pulse */
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 61, 71, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 61, 71, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 61, 71, 0); } }
        .live-pulse {
            width: 8px; height: 8px; background: var(--primary-red); border-radius: 50%; display: inline-block; animation: pulse-red 2s infinite; margin-right: 5px;
        }

    </style>
</head>
<body>

    <nav class="command-bridge">
        <div class="brand">
            <span>🦞 ASGARD</span>
            <span style="font-size: 0.5em; color: #666;">COMMAND_BRIDGE_v3.0.1</span>
        </div>
        <div class="nav-items">
            <a href="#" class="nav-item active" onclick="loadView('hud')">HUD</a>
            <a href="#" class="nav-item" onclick="loadView('audit')">Audit Hub</a>
            <a href="#" class="nav-item" onclick="loadView('reports')">SharePoint</a>
            <a href="#" class="nav-item" onclick="loadView('squad')">Squad Status</a>
        </div>
        <div style="font-size: 0.7em; color: var(--terminal-green);">
            <span class="live-pulse"></span> SYSTEM_STABLE
        </div>
    </nav>

    <main class="main-stage">
        <!-- Sidebar: Site Intelligence -->
        <section class="glass-card">
            <h2>📍 Site Intel</h2>
            <div class="stat-row">
                <span>Active Site</span>
                <span class="stat-val" id="activeSite">BENOWA ELC</span>
            </div>
            <div style="margin-top: auto;">
                <div style="font-size: 0.7em; color: #666; margin-bottom: 5px;">Compliance Index</div>
                <div style="height: 6px; width: 100%; background: #222; border-radius: 3px;">
                    <div style="width: 85%; height: 100%; background: var(--terminal-green); border-radius: 3px;"></div>
                </div>
            </div>
        </section>

        <!-- Dynamic Content Area -->
        <section class="viewport glass-card">
            <iframe id="viewFrame" src="about:blank"></iframe>
        </section>

        <!-- Right Side: Agent Squad -->
        <section class="glass-card">
            <h2>🛡️ Asgardian Squad</h2>
            <div class="agent-gallery">
                <div class="agent-mini-card">
                    <div class="agent-avatar">🦞</div>
                    <span class="agent-name">BRUCE</span>
                    <span class="agent-status">ORCHESTRATOR</span>
                </div>
                <div class="agent-mini-card">
                    <div class="agent-avatar">⚡</div>
                    <span class="agent-name">THOR</span>
                    <span class="agent-status">STANDBY</span>
                </div>
                <div class="agent-mini-card">
                    <div class="agent-avatar">🕵️‍♂️</div>
                    <span class="agent-name">LOKI</span>
                    <span class="agent-status">TRIAGE</span>
                </div>
                <div class="agent-mini-card">
                    <div class="agent-avatar">👁️</div>
                    <span class="agent-name">HEIMDALL</span>
                    <span class="agent-status">HUNTING</span>
                </div>
                <div class="agent-mini-card">
                    <div class="agent-avatar">🗡️</div>
                    <span class="agent-name">SIF</span>
                    <span class="agent-status">READY</span>
                </div>
                <div class="agent-mini-card">
                    <div class="agent-avatar">💼</div>
                    <span class="agent-name">PHIL</span>
                    <span class="agent-status">FORENSICS</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        const views = {
            hud: 'https://raw.githack.com/SimplyICT/OpenClaw-Bruce/main/dashboard/static/index.html',
            audit: 'https://raw.githack.com/SimplyICT/OpenClaw-Bruce/main/dashboard/static/audit_hub_v57.html',
            reports: 'https://cccex1.sharepoint.com/sites/bhelc-admin/Shared%20Documents/Forms/AllItems.aspx?id=%2Fsites%2Fbhelc%2Dadmin%2FShared%20Documents%2FAudit%20reports',
            squad: 'about:blank'
        };

        function loadView(key) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            
            const frame = document.getElementById('viewFrame');
            frame.src = views[key] + '?v=' + Date.now();
        }

        // Default Load
        window.onload = () => loadView('hud');
    </script>
</body>
</html>
